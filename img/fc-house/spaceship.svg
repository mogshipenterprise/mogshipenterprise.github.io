<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="shipTitle">
  <title id="shipTitle">Cutaway diagram of the Mogship Enterprise FC ship</title>
  <defs>
    <linearGradient id="bgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="100%" stop-color="#0d1f36"/>
    </linearGradient>
    <linearGradient id="hullFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123a63"/>
      <stop offset="100%" stop-color="#0d365f"/>
    </linearGradient>
    <linearGradient id="noseFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d365f"/>
      <stop offset="100%" stop-color="#0d6aa8"/>
    </linearGradient>
    <linearGradient id="roomFillA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <radialGradient id="nebulaPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8f6bff" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#8f6bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8f6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fe0c5" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#3fe0c5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3fe0c5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#ff6ec7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pompomFill" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffb3c6"/>
      <stop offset="100%" stop-color="#e2445c"/>
    </radialGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="rimBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <clipPath id="hullClip">
      <rect x="100" y="70" width="950" height="560" rx="110"/>
    </clipPath>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.9; }
    }
    @keyframes trimGlow {
      0%, 100% { stroke-opacity: 0.25; }
      50% { stroke-opacity: 0.6; }
    }
    @keyframes portholeFlicker {
      0%, 40%, 100% { opacity: 0.55; }
      20% { opacity: 1; }
    }
    @keyframes discoChase {
      0%, 100% { fill: #f0b560; opacity: 0.45; transform: scale(1); }
      50% { fill: #ff6ec7; opacity: 1; transform: scale(1.4); }
    }
    @keyframes antennaBob {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes rimPulse {
      0%, 100% { stroke-opacity: 0.18; }
      50% { stroke-opacity: 0.4; }
    }

    .star { animation: twinkle 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .hull-trim { animation: trimGlow 4s ease-in-out infinite; }
    .porthole { animation: portholeFlicker 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .dance-light { animation: discoChase 1.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .thrust-streak { animation: twinkle 1.8s ease-in-out infinite; }
    .antenna { animation: antennaBob 3.2s ease-in-out infinite; transform-origin: 1000px 68px; }
    .rim-glow { animation: rimPulse 4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .star, .hull-trim, .porthole, .dance-light,
      .thrust-streak, .antenna, .rim-glow {
        animation: none;
      }
    }
  </style>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bgSky)"/>

  <!-- nebula glow, mostly hidden behind the hull, peeking through the sky margins -->
  <ellipse cx="260" cy="10" rx="190" ry="120" fill="url(#nebulaPurple)" filter="url(#softBlur)"/>
  <ellipse cx="960" cy="0" rx="220" ry="130" fill="url(#nebulaTeal)" filter="url(#softBlur)"/>
  <ellipse cx="310" cy="700" rx="200" ry="120" fill="url(#nebulaTeal)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="700" rx="220" ry="130" fill="url(#nebulaPink)" filter="url(#softBlur)"/>

  <!-- distant ringed planet -->
  <g opacity="0.8">
    <ellipse cx="42" cy="30" rx="28" ry="9" fill="none" stroke="#f0b560" stroke-width="2" opacity="0.35" transform="rotate(-18 42 30)"/>
    <circle cx="42" cy="30" r="15" fill="#7a5cff" opacity="0.55"/>
  </g>

  <circle class="star" cx="120" cy="90" r="1.6" fill="#fff" opacity="0.7" style="animation-delay: 0s;"/>
  <circle class="star" cx="980" cy="60" r="2" fill="#fff" opacity="0.6" style="animation-delay: 0.6s;"/>
  <circle class="star" cx="1080" cy="640" r="1.5" fill="#fff" opacity="0.5" style="animation-delay: 1.2s;"/>
  <circle class="star" cx="70" cy="600" r="2" fill="#fff" opacity="0.6" style="animation-delay: 1.8s;"/>
  <circle class="star" cx="640" cy="40" r="1.4" fill="#fff" opacity="0.6" style="animation-delay: 2.4s;"/>
  <circle class="star" cx="300" cy="660" r="1.6" fill="#fff" opacity="0.5" style="animation-delay: 0.9s;"/>
  <circle class="star" cx="1140" cy="150" r="1.4" fill="#fff" opacity="0.5" style="animation-delay: 1.5s;"/>
  <circle class="star" cx="200" cy="30" r="1.2" fill="#fff" opacity="0.5" style="animation-delay: 2.1s;"/>
  <circle class="star" cx="500" cy="15" r="1.3" fill="#fff" opacity="0.5" style="animation-delay: 1s;"/>
  <circle class="star" cx="1150" cy="20" r="1.4" fill="#fff" opacity="0.6" style="animation-delay: 1.9s;"/>

  <!-- rim glow behind the whole silhouette -->
  <rect class="rim-glow" x="100" y="70" width="950" height="560" rx="110" fill="none" stroke="#f0b560" stroke-width="16" opacity="0.6" filter="url(#rimBlur)"/>
  <polygon class="rim-glow" points="1050,150 1150,350 1050,550" fill="none" stroke="#f0b560" stroke-width="14" opacity="0.6" filter="url(#rimBlur)"/>

  <!-- thruster speed streaks -->
  <line class="thrust-streak" x1="-15" y1="216" x2="18" y2="216" stroke="#f0b560" stroke-width="2" opacity="0.5" style="animation-delay: 0s;"/>
  <line class="thrust-streak" x1="-20" y1="230" x2="22" y2="230" stroke="#f0b560" stroke-width="2.5" opacity="0.6" style="animation-delay: 0.4s;"/>
  <line class="thrust-streak" x1="-15" y1="244" x2="18" y2="244" stroke="#f0b560" stroke-width="2" opacity="0.5" style="animation-delay: 0.8s;"/>
  <line class="thrust-streak" x1="-15" y1="456" x2="18" y2="456" stroke="#f0b560" stroke-width="2" opacity="0.5" style="animation-delay: 0.2s;"/>
  <line class="thrust-streak" x1="-20" y1="470" x2="22" y2="470" stroke="#f0b560" stroke-width="2.5" opacity="0.6" style="animation-delay: 0.6s;"/>
  <line class="thrust-streak" x1="-15" y1="484" x2="18" y2="484" stroke="#f0b560" stroke-width="2" opacity="0.5" style="animation-delay: 1s;"/>

  <!-- tail engine pods -->
  <rect x="55" y="205" width="75" height="50" rx="18" fill="#0a2440" stroke="#0d6aa8" stroke-width="2"/>
  <rect x="55" y="445" width="75" height="50" rx="18" fill="#0a2440" stroke="#0d6aa8" stroke-width="2"/>
  <line x1="80" y1="207" x2="80" y2="253" stroke="#0d6aa8" stroke-width="1.5" opacity="0.7"/>
  <line x1="105" y1="207" x2="105" y2="253" stroke="#0d6aa8" stroke-width="1.5" opacity="0.7"/>
  <line x1="80" y1="447" x2="80" y2="493" stroke="#0d6aa8" stroke-width="1.5" opacity="0.7"/>
  <line x1="105" y1="447" x2="105" y2="493" stroke="#0d6aa8" stroke-width="1.5" opacity="0.7"/>

  <!-- rear stabilizer fins -->
  <polygon points="170,70 270,70 205,18" fill="url(#noseFill)" stroke="#f0b560" stroke-width="2"/>
  <polygon points="170,630 270,630 205,682" fill="url(#noseFill)" stroke="#f0b560" stroke-width="2"/>

  <!-- main hull -->
  <rect x="100" y="70" width="950" height="560" rx="110" fill="url(#hullFill)" stroke="#0a2440" stroke-width="6"/>

  <!-- glossy diagonal sheen across the hull -->
  <g clip-path="url(#hullClip)" opacity="0.5">
    <polygon points="180,70 320,70 60,630 -80,630" fill="#ffffff" opacity="0.06"/>
    <polygon points="480,70 560,70 300,630 220,630" fill="#ffffff" opacity="0.05"/>
  </g>

  <!-- top/bottom shading to suggest a rounded hull -->
  <rect x="118" y="78" width="914" height="26" rx="13" fill="#ffffff" opacity="0.08"/>
  <rect x="118" y="616" width="914" height="14" rx="7" fill="#020814" opacity="0.25"/>

  <!-- nose cone -->
  <polygon points="1050,150 1150,350 1050,550" fill="url(#noseFill)" stroke="#0a2440" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="1050,150 1015,122 1050,180" fill="url(#hullFill)" stroke="#f0b560" stroke-width="1.5" opacity="0.9"/>
  <polygon points="1050,550 1015,578 1050,520" fill="url(#hullFill)" stroke="#f0b560" stroke-width="1.5" opacity="0.9"/>

  <!-- pom-pom antenna -->
  <g class="antenna">
    <line x1="1000" y1="70" x2="1000" y2="34" stroke="#f0b560" stroke-width="2.5"/>
    <circle cx="1000" cy="26" r="6" fill="url(#pompomFill)"/>
    <circle cx="994" cy="21" r="4" fill="url(#pompomFill)"/>
    <circle cx="1006" cy="21" r="4" fill="url(#pompomFill)"/>
    <circle cx="1000" cy="16" r="4" fill="url(#pompomFill)"/>
  </g>

  <!-- hull trim line -->
  <rect class="hull-trim" x="118" y="88" width="914" height="524" rx="96" fill="none" stroke="#f0b560" stroke-width="1.5" opacity="0.35"/>

  <!-- rivets along the hull trim corners -->
  <g fill="#f0b560" opacity="0.45">
    <circle cx="118" cy="88" r="2.5"/>
    <circle cx="1032" cy="88" r="2.5"/>
    <circle cx="118" cy="612" r="2.5"/>
    <circle cx="1032" cy="612" r="2.5"/>
  </g>

  <!-- north side airlock door -->
  <rect x="540" y="48" width="70" height="46" rx="8" fill="#c0392b" stroke="#7a1f1f" stroke-width="3"/>
  <line x1="575" y1="52" x2="575" y2="90" stroke="#7a1f1f" stroke-width="2"/>
  <g opacity="0.85">
    <line x1="544" y1="88" x2="550" y2="82" stroke="#f0b560" stroke-width="2"/>
    <line x1="552" y1="88" x2="560" y2="78" stroke="#f0b560" stroke-width="2"/>
    <line x1="590" y1="88" x2="598" y2="78" stroke="#f0b560" stroke-width="2"/>
    <line x1="598" y1="88" x2="606" y2="80" stroke="#f0b560" stroke-width="2"/>
  </g>
  <circle class="porthole" cx="588" cy="71" r="3.5" fill="#f0b560" style="animation-delay: 0.5s;"/>

  <!-- deck divider lines -->
  <line x1="140" y1="300" x2="1010" y2="300" stroke="#f0b560" stroke-width="1.5" opacity="0.3"/>
  <line x1="140" y1="500" x2="1010" y2="500" stroke="#f0b560" stroke-width="1.5" opacity="0.3"/>

  <!-- panel seam between the port and starboard rooms on decks A and B -->
  <line x1="570" y1="80" x2="570" y2="495" stroke="#f0b560" stroke-width="1.5" opacity="0.22"/>
  <circle cx="570" cy="140" r="2" fill="#f0b560" opacity="0.4"/>
  <circle cx="570" cy="340" r="2" fill="#f0b560" opacity="0.4"/>

  <!-- Deck A: Game Room | FC Member Quarters -->
  <rect x="140" y="110" width="410" height="180" rx="18" fill="url(#roomFillA)" stroke="#0d6aa8" stroke-width="1.5"/>
  <rect x="590" y="110" width="420" height="180" rx="18" fill="url(#roomFillA)" stroke="#0d6aa8" stroke-width="1.5"/>

  <!-- Deck B: Bar | Living Room -->
  <rect x="140" y="310" width="410" height="180" rx="18" fill="url(#roomFillA)" stroke="#0d6aa8" stroke-width="1.5"/>
  <rect x="590" y="310" width="420" height="180" rx="18" fill="url(#roomFillA)" stroke="#0d6aa8" stroke-width="1.5"/>

  <!-- Deck C: Lower level dance floor -->
  <rect x="140" y="510" width="870" height="110" rx="18" fill="url(#roomFillA)" stroke="#f0b560" stroke-width="1.5"/>

  <!-- room corner rivets, sci-fi schematic detailing -->
  <g fill="#f0b560" opacity="0.5">
    <circle cx="146" cy="116" r="2.2"/><circle cx="544" cy="116" r="2.2"/><circle cx="146" cy="284" r="2.2"/><circle cx="544" cy="284" r="2.2"/>
    <circle cx="596" cy="116" r="2.2"/><circle cx="1004" cy="116" r="2.2"/><circle cx="596" cy="284" r="2.2"/><circle cx="1004" cy="284" r="2.2"/>
    <circle cx="146" cy="316" r="2.2"/><circle cx="544" cy="316" r="2.2"/><circle cx="146" cy="484" r="2.2"/><circle cx="544" cy="484" r="2.2"/>
    <circle cx="596" cy="316" r="2.2"/><circle cx="1004" cy="316" r="2.2"/><circle cx="596" cy="484" r="2.2"/><circle cx="1004" cy="484" r="2.2"/>
    <circle cx="146" cy="516" r="2.2"/><circle cx="1004" cy="516" r="2.2"/><circle cx="146" cy="614" r="2.2"/><circle cx="1004" cy="614" r="2.2"/>
  </g>

  <!-- porthole windows -->
  <g fill="#0a2440" stroke="#f0b560" stroke-width="1.5" opacity="0.8">
    <circle class="porthole" cx="200" cy="160" r="10" style="animation-delay: 0s;"/>
    <circle class="porthole" cx="260" cy="160" r="10" style="animation-delay: 0.8s;"/>
    <circle class="porthole" cx="650" cy="160" r="10" style="animation-delay: 1.6s;"/>
    <circle class="porthole" cx="710" cy="160" r="10" style="animation-delay: 2.4s;"/>
    <circle class="porthole" cx="200" cy="440" r="10" style="animation-delay: 3.2s;"/>
    <circle class="porthole" cx="260" cy="440" r="10" style="animation-delay: 0.4s;"/>
    <circle class="porthole" cx="650" cy="440" r="10" style="animation-delay: 1.2s;"/>
    <circle class="porthole" cx="710" cy="440" r="10" style="animation-delay: 2s;"/>
  </g>

  <!-- lower deck floor lights -->
  <g fill="#f0b560" opacity="0.6">
    <circle class="dance-light" cx="220" cy="565" r="4" style="animation-delay: 0s;"/>
    <circle class="dance-light" cx="340" cy="565" r="4" style="animation-delay: 0.16s;"/>
    <circle class="dance-light" cx="460" cy="565" r="4" style="animation-delay: 0.32s;"/>
    <circle class="dance-light" cx="580" cy="565" r="4" style="animation-delay: 0.48s;"/>
    <circle class="dance-light" cx="700" cy="565" r="4" style="animation-delay: 0.64s;"/>
    <circle class="dance-light" cx="820" cy="565" r="4" style="animation-delay: 0.8s;"/>
    <circle class="dance-light" cx="930" cy="565" r="4" style="animation-delay: 0.96s;"/>
  </g>
</svg>
